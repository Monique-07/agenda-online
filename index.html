<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Atendimentos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 10px;
}

.container {
    background: #ffffff;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
}

.form-horario {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.form-horario input,
.form-horario button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

.form-horario input {
    flex: 1;
}

.form-horario button {
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    min-width: 160px;
}

.form-horario button:hover {
    opacity: 0.9;
}

.table-wrapper {
    width: 100%;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

th {
    background: #667eea;
    color: white;
}

tr:hover {
    background: #f8f8f8;
}

button {
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
}

.agendar { background: #27ae60; color: white; }
.ocupado { background: #e74c3c; color: white; cursor: not-allowed; }
.excluir { background: #333; color: white; }

@media (max-width: 768px) {

    .form-horario {
        flex-direction: column;
    }

    .form-horario button {
        width: 100%;
        min-width: unset;
    }

    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tr {
        background: #ffffff;
        margin-bottom: 15px;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    td {
        border: none;
        text-align: left;
        padding: 8px 0;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    td::before {
        font-weight: 600;
        margin-right: 10px;
    }

    td:nth-of-type(1)::before { content: "Nome:"; }
    td:nth-of-type(2)::before { content: "Data:"; }
    td:nth-of-type(3)::before { content: "Hora:"; }
    td:nth-of-type(4)::before { content: "Status:"; }
    td:nth-of-type(5)::before { content: "Excluir:"; }
}
</style>
</head>
<body>

<div class="container">
    <h1>Agenda de Atendimentos</h1>

    <div class="form-horario">
        <input type="date" id="novaData">
        <input type="time" id="novaHora">
        <button onclick="adicionarHorario()">Adicionar Horário</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Status</th>
                    <th>Excluir</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "agenda-atendimento-2640c.firebaseapp.com",
  projectId: "agenda-atendimento-2640c",
  storageBucket: "agenda-atendimento-2640c.firebasestorage.app",
  messagingSenderId: "465879153833",
  appId: "1:465879153833:web:bc70bf8d28304db51a7db8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tabela = document.getElementById("tabela");

function formatarData(dataISO) {
    if (!dataISO) return "-";
    const [ano, mes, dia] = dataISO.split('-');
    return `${dia}/${mes}/${ano}`;
}

window.adicionarHorario = async function() {
    const data = document.getElementById("novaData").value;
    const hora = document.getElementById("novaHora").value;

    if (!data || !hora) {
        alert("Selecione data e horário!");
        return;
    }

    await addDoc(collection(db, "atendimentos"), {
        nome: "",
        dataISO: data,
        hora: hora
    });

    document.getElementById("novaData").value = "";
    document.getElementById("novaHora").value = "";

    carregarAgenda();
}

async function carregarAgenda() {
    tabela.innerHTML = "";

    const q = query(
        collection(db, "atendimentos"),
        orderBy("dataISO", "asc"),
        orderBy("hora", "asc")
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docSnap) => {
        const item = docSnap.data();
        const ocupado = item.nome && item.nome.trim() !== "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${ocupado ? item.nome : "-"}</td>
            <td>${formatarData(item.dataISO)}</td>
            <td>${item.hora || "-"}</td>
            <td>
                ${ocupado
                    ? '<button class="ocupado" disabled>Ocupado</button>'
                    : `<button class="agendar" onclick="agendar('${docSnap.id}')">Agendar</button>`}
            </td>
            <td>
                <button class="excluir" onclick="excluirHorario('${docSnap.id}')">X</button>
            </td>
        `;

        tabela.appendChild(tr);
    });
}

window.agendar = async function(id) {
    const nome = prompt("Digite o nome do cliente:");
    if (!nome) return;

    await updateDoc(doc(db, "atendimentos", id), { nome });
    carregarAgenda();
}

window.excluirHorario = async function(id) {
    if (!confirm("Deseja excluir este horário?")) return;
    await deleteDoc(doc(db, "atendimentos", id));
    carregarAgenda();
}

carregarAgenda();
</script>

</body>
</html>
