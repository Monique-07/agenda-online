<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Atendimentos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    width: 95%;
    max-width: 900px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 { text-align: center; margin-bottom: 20px; }

.form-horario {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.form-horario input, .form-horario button {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.form-horario button {
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
}

.form-horario button:hover { opacity: 0.9; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 14px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    background: #667eea;
    color: white;
}

tr:hover { background: #f1f1f1; }

button {
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.agendar { background: #27ae60; color: white; }
.ocupado { background: #e74c3c; color: white; cursor: not-allowed; }
.excluir { background: #333; color: white; }
</style>
</head>
<body>

<div class="container">
    <h1>Agenda de Atendimentos</h1>

    <div class="form-horario">
        <input type="date" id="novaData">
        <input type="time" id="novaHora">
        <button onclick="adicionarHorario()">Adicionar Horário</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Data</th>
                <th>Hora</th>
                <th>Status</th>
                <th>Excluir</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcw0godfbxrTKQQRnyhP62IPD45I3Vgok",
  authDomain: "agenda-atendimento-2640c.firebaseapp.com",
  projectId: "agenda-atendimento-2640c",
  storageBucket: "agenda-atendimento-2640c.firebasestorage.app",
  messagingSenderId: "465879153833",
  appId: "1:465879153833:web:bc70bf8d28304db51a7db8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tabela = document.getElementById("tabela");

function formatarData(dataISO) {
    if (!dataISO) return "-";
    const [ano, mes, dia] = dataISO.split('-');
    return `${dia}/${mes}`;
}

window.adicionarHorario = async function() {
    try {
        const data = document.getElementById("novaData").value;
        const hora = document.getElementById("novaHora").value;

        if (!data || !hora) {
            alert("Selecione data e horário!");
            return;
        }

        await addDoc(collection(db, "atendimentos"), {
            nome: "",
            dataISO: data,
            hora: hora
        });

        document.getElementById("novaData").value = "";
        document.getElementById("novaHora").value = "";

        await carregarAgenda();

    } catch (error) {
        console.error("Erro ao adicionar:", error);
        alert("Erro ao salvar no Firebase. Verifique as regras do Firestore.");
    }
}

async function carregarAgenda() {
    try {
        tabela.innerHTML = "";

        const snapshot = await getDocs(collection(db, "atendimentos"));

        snapshot.forEach((docSnap) => {
            const item = docSnap.data();
            const ocupado = item.nome && item.nome.trim() !== "";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${ocupado ? item.nome : "-"}</td>
                <td>${formatarData(item.dataISO)}</td>
                <td>${item.hora || "-"}</td>
                <td>
                    ${ocupado
                        ? '<button class="ocupado" disabled>Ocupado</button>'
                        : `<button class="agendar" onclick="agendar('${docSnap.id}')">Agendar</button>`}
                </td>
                <td>
                    <button class="excluir" onclick="excluirHorario('${docSnap.id}')">X</button>
                </td>
            `;

            tabela.appendChild(tr);
        });

    } catch (error) {
        console.error("Erro ao carregar:", error);
        alert("Erro ao conectar com o Firebase. Verifique se o Firestore está ativado.");
    }
}

window.agendar = async function(id) {
    try {
        const nome = prompt("Digite o nome do cliente:");
        if (!nome) return;

        const ref = doc(db, "atendimentos", id);
        await updateDoc(ref, { nome });

        await carregarAgenda();

    } catch (error) {
        console.error("Erro ao agendar:", error);
        alert("Erro ao atualizar no Firebase.");
    }
}

window.excluirHorario = async function(id) {
    try {
        if (!confirm("Deseja excluir este horário?")) return;
        await deleteDoc(doc(db, "atendimentos", id));
        await carregarAgenda();
    } catch (error) {
        console.error("Erro ao excluir:", error);
        alert("Erro ao excluir no Firebase.");
    }
}

carregarAgenda();
</script>

</body>
</html>
